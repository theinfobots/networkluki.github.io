<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Sidan hittades inte</title>
    <link rel="stylesheet" href="/error.css">
</head>
<body>
    <main class="error-page">
        <div class="error-card">
            <p class="terminal">\\:NETWORKLUKI:~$</p>
            <h1 class="title">404</h1>
            <h2 class="subtitle">Sidan hittades inte</h2>
            <p class="description">
                Länken du följde finns inte längre eller har flyttats.
                Gå tillbaka till startsidan och fortsätt därifrån.
            </p>

            <div class="meta">
                <p>
                    <strong>Begärd sökväg:</strong><br>
                    <code id="path">unknown</code>
                </p>
                <p>
                    <strong>Referrer:</strong><br>
                    <code id="ref">unknown</code>
                </p>
            </div>

            <div class="actions">
                <a href="/" class="button">Till startsidan</a>
                <a href="https://github.com/NetworkLuki" class="button ghost" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>

            <p class="privacy-note">Static site: ingen data loggas eller sparas.</p>
        </div>
    </main>
    <script src="/404.js" defer></script>
</body>
</html>
