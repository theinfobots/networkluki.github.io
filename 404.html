<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; img-src 'self'; style-src 'self'; script-src 'self'; upgrade-insecure-requests">
    <title>404 – Page Not Found</title>
    <link rel="stylesheet" href="/error.css">
</head>
<body>
    <main class="error-page">
        <div class="error-card">
            <p class="terminal">\\:NETWORKLUKI:~$</p>
            <h1 class="title">404</h1>
            <h2 class="subtitle">Page Not Found</h2>
            <p class="description">
                The link you followed no longer exists or has moved.
                Return to the homepage and continue from there.
            </p>

            <div class="meta">
                <p>
                    <strong>Requested path:</strong><br>
                    <code id="path">unknown</code>
                </p>
                <p>
                    <strong>Referrer:</strong><br>
                    <code id="ref">unknown</code>
                </p>
            </div>

            <div class="actions">
                <a href="/" class="button">Go to homepage</a>
                <a href="https://github.com/NetworkLuki" class="button ghost" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>

            <p class="privacy-note">Static site: no data is logged or stored.</p>
        </div>
    </main>
    <script src="/404.js" defer></script>
</body>
</html>
